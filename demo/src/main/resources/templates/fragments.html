<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — ID Card System'">ID Card System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-person-badge-fill"></i>ID Card Manager</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/profiles"><i class="bi bi-people-fill"></i> Profiles</a></li>
                    <li class="nav-item"><a class="nav-link" href="/templates"><i class="bi bi-palette-fill"></i> Templates</a></li>
                    <li class="nav-item"><a class="nav-link" href="/cards/batch"><i class="bi bi-printer-fill"></i> Batch Print</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer" class="footer">
        <div class="container">
            <p class="mb-0">ID Card Management System &copy; 2026</p>
        </div>
    </footer>
</body>
</html>
