<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments :: head('Profile Detail')}"></head>
<body>
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="container container-wrapper">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="page-title mb-0"><i class="bi bi-person-badge-fill"></i>Profile Detail</h4>
            <div class="d-flex gap-2">
                <a class="btn btn-warning" th:href="@{/profiles/{id}/edit(id=${profile.id})}"><i class="bi bi-pencil"></i> Edit</a>
                <a class="btn btn-outline-primary" th:href="@{/cards/pdf/{profileId}(profileId=${profile.id})}"><i class="bi bi-file-pdf"></i> PDF</a>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <div th:if="${profile.hasPhoto()}">
                        <img th:src="@{/cards/photos/{filename}(filename=${profile.photoFileName})}"
                             class="rounded-circle mb-3 img-fluid" style="max-width:150px;width:100%;aspect-ratio:1;object-fit:cover;border:4px solid #e2e8f0;">
                    </div>
                    <div th:unless="${profile.hasPhoto()}" class="mb-3">
                        <div class="photo-placeholder mx-auto" style="background: linear-gradient(135deg, #667eea, #764ba2)" th:text="${#strings.substring(profile.fullName, 0, 1)}"></div>
                    </div>
                    <h5 class="mb-1" th:text="${profile.fullName}"></h5>
                    <span class="badge fs-6 mb-2" th:classappend="${profile.type == 'STUDENT'} ? 'bg-primary' : (${profile.type == 'EMPLOYEE'} ? 'bg-success' : 'bg-secondary')" th:text="${profile.type}"></span>
                    <p class="text-muted mb-0"><code th:text="${profile.registrationNumber}"></code></p>
                </div>

                <div class="card mt-3 p-3 text-center">
                    <h6 class="mb-3"><i class="bi bi-qr-code me-1"></i>QR Code</h6>
                    <img th:src="@{/cards/qr/{profileId}(profileId=${profile.id})}" alt="QR Code" class="mx-auto" style="width:120px">
                    <h6 class="mt-3 mb-2"><i class="bi bi-upc-scan me-1"></i>Barcode</h6>
                    <img th:src="@{/cards/barcode/{profileId}(profileId=${profile.id})}" alt="Barcode" class="mx-auto" style="height:40px">
                </div>
            </div>

            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-white py-3">
                        <h6 class="mb-0 fw-bold"><i class="bi bi-info-circle me-1"></i>Information</h6>
                    </div>
                    <div class="card-body p-0">
                        <table class="table mb-0">
                            <tbody>
                                <tr><th class="ps-4" style="width:180px">Registration No</th><td><code th:text="${profile.registrationNumber}"></code></td></tr>
                                <tr><th class="ps-4">Full Name</th><td th:text="${profile.fullName}"></td></tr>
                                <tr><th class="ps-4">Type</th><td><span class="badge" th:classappend="${profile.type == 'STUDENT'} ? 'bg-primary' : (${profile.type == 'EMPLOYEE'} ? 'bg-success' : 'bg-secondary')" th:text="${profile.type}"></span></td></tr>
                                <tr><th class="ps-4">Department</th><td th:text="${profile.department ?: '-'}"></td></tr>
                                <tr><th class="ps-4">Title</th><td th:text="${profile.title ?: '-'}"></td></tr>
                                <tr><th class="ps-4">Email</th><td th:text="${profile.email ?: '-'}"></td></tr>
                                <tr><th class="ps-4">Phone</th><td th:text="${profile.phone ?: '-'}"></td></tr>
                                <tr><th class="ps-4">Blood Group</th><td th:text="${profile.bloodGroup ?: '-'}"></td></tr>
                                <tr><th class="ps-4">Date of Birth</th><td th:text="${profile.dateOfBirth ?: '-'}"></td></tr>
                                <tr><th class="ps-4">Issue Date</th><td th:text="${profile.issueDate}"></td></tr>
                                <tr><th class="ps-4">Expiry Date</th><td th:text="${profile.expiryDate ?: '-'}"></td></tr>
                                <tr><th class="ps-4">Barcode Type</th><td th:text="${profile.barcodeType}"></td></tr>
                                <tr><th class="ps-4">Template</th><td th:text="${profile.template?.name ?: '-'}"></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="mt-3">
                    <a class="btn btn-secondary" th:href="@{/cards/preview/{profileId}(profileId=${profile.id})}"><i class="bi bi-eye-fill"></i> Preview ID Card</a>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
