<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments :: head('Profile Form')}"></head>
<body>
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="container container-wrapper">
        <h4 class="page-title" th:if="${profile.id != null}"><i class="bi bi-pencil-square"></i>Edit Profile</h4>
        <h4 class="page-title" th:unless="${profile.id != null}"><i class="bi bi-person-plus-fill"></i>New Profile</h4>

        <div class="card">
            <div class="card-body p-4">
                <form th:action="${profile.id != null} ? @{/profiles/{id}/edit(id=${profile.id})} : @{/profiles/new}"
                      method="post" enctype="multipart/form-data" th:object="${profile}">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Full Name <span class="text-danger">*</span></label>
                            <input class="form-control" type="text" th:field="*{fullName}" required placeholder="e.g. John Doe">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Type <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{type}">
                                <option th:each="t : ${profileTypes}" th:value="${t}" th:text="${t}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Barcode Type</label>
                            <select class="form-select" th:field="*{barcodeType}">
                                <option value="CODE_128">Code 128</option>
                                <option value="EAN_13">EAN 13</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mt-2">
                        <div class="col-md-4">
                            <label class="form-label">Department</label>
                            <input class="form-control" type="text" th:field="*{department}" placeholder="e.g. Computer Science">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Title / Program</label>
                            <input class="form-control" type="text" th:field="*{title}" placeholder="e.g. Professor / BSc Year 2">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Email</label>
                            <input class="form-control" type="email" th:field="*{email}" placeholder="email@example.com">
                        </div>
                    </div>

                    <div class="row g-3 mt-2">
                        <div class="col-md-4">
                            <label class="form-label">Phone</label>
                            <input class="form-control" type="text" th:field="*{phone}" placeholder="+855 12 345 678">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Blood Group</label>
                            <input class="form-control" type="text" th:field="*{bloodGroup}" placeholder="e.g. A+">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Date of Birth</label>
                            <input class="form-control" type="date" th:field="*{dateOfBirth}">
                        </div>
                    </div>

                    <div class="row g-3 mt-2">
                        <div class="col-md-6">
                            <label class="form-label">Expiry Date</label>
                            <input class="form-control" type="date" th:field="*{expiryDate}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Template</label>
                            <select class="form-select" th:field="*{template}">
                                <option th:value="${null}">— None —</option>
                                <option th:each="t : ${templates}" th:value="${t.id}" th:text="${t.name}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Photo (JPEG/PNG, max 5MB)</label>
                        <input class="form-control" type="file" name="photo" accept="image/jpeg,image/png">
                        <div class="form-text">Upload a professional portrait photo for the ID card.</div>
                    </div>

                    <hr class="my-4">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4"><i class="bi bi-check-lg"></i> Save</button>
                        <a href="/profiles" class="btn btn-outline-secondary px-4"><i class="bi bi-x-lg"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
