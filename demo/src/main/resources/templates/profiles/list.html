<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments :: head('Profiles')}"></head>
<body>
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="container container-wrapper">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="page-title mb-0"><i class="bi bi-people-fill"></i>Profiles</h4>
            <div class="dropdown">
                <button class="btn btn-success dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="bi bi-plus-lg"></i> New Profile
                </button>
                <ul class="dropdown-menu shadow">
                    <li><a class="dropdown-item" href="/profiles/new?type=STUDENT"><i class="bi bi-mortarboard-fill me-2 text-primary"></i>Student</a></li>
                    <li><a class="dropdown-item" href="/profiles/new?type=EMPLOYEE"><i class="bi bi-briefcase-fill me-2 text-success"></i>Employee</a></li>
                    <li><a class="dropdown-item" href="/profiles/new?type=USER"><i class="bi bi-person-fill me-2 text-secondary"></i>User</a></li>
                </ul>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-3">
                <div class="d-flex flex-wrap gap-2 align-items-center">
                    <form class="d-flex" method="get" action="/profiles">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                            <input class="form-control border-start-0" type="search" name="query" th:value="${query}" placeholder="Search by name...">
                        </div>
                    </form>
                    <div class="btn-group ms-auto" role="group">
                        <a class="btn btn-outline-secondary" th:classappend="${type == null} ? 'active'" href="/profiles">All</a>
                        <a class="btn btn-outline-secondary" th:classappend="${type == 'STUDENT'} ? 'active'" href="/profiles?type=STUDENT"><i class="bi bi-mortarboard-fill"></i> Students</a>
                        <a class="btn btn-outline-secondary" th:classappend="${type == 'EMPLOYEE'} ? 'active'" href="/profiles?type=EMPLOYEE"><i class="bi bi-briefcase-fill"></i> Employees</a>
                        <a class="btn btn-outline-secondary" th:classappend="${type == 'USER'} ? 'active'" href="/profiles?type=USER"><i class="bi bi-person-fill"></i> Users</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-3">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Reg No</th>
                            <th>Full Name</th>
                            <th>Type</th>
                            <th>Department</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${profiles}">
                            <td><code th:text="${p.registrationNumber}"></code></td>
                            <td><strong th:text="${p.fullName}"></strong></td>
                            <td>
                                <span class="badge" th:classappend="${p.type == 'STUDENT'} ? 'bg-primary' : (${p.type == 'EMPLOYEE'} ? 'bg-success' : 'bg-secondary')" th:text="${p.type}"></span>
                            </td>
                            <td th:text="${p.department ?: '-'}"></td>
                            <td class="text-end">
                                <a class="btn btn-sm btn-outline-info" th:href="@{/profiles/{id}(id=${p.id})}" title="View"><i class="bi bi-eye"></i></a>
                                <a class="btn btn-sm btn-outline-warning" th:href="@{/profiles/{id}/edit(id=${p.id})}" title="Edit"><i class="bi bi-pencil"></i></a>
                                <a class="btn btn-sm btn-outline-danger" th:href="@{/profiles/{id}/delete(id=${p.id})}" title="Delete"
                                   onclick="return confirm('Delete this profile?')"><i class="bi bi-trash"></i></a>
                                <a class="btn btn-sm btn-outline-secondary" th:href="@{/cards/preview/{profileId}(profileId=${p.id})}" title="Preview"><i class="bi bi-eye-fill"></i></a>
                                <a class="btn btn-sm btn-outline-primary" th:href="@{/cards/pdf/{profileId}(profileId=${p.id})}" title="PDF"><i class="bi bi-file-pdf"></i></a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(profiles)}">
                            <td colspan="5" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox" style="font-size: 2rem; display: block; margin-bottom: 0.5rem;"></i>
                                No profiles found
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
