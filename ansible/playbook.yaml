---
- name: Build Test and Backup Spring Boot Application
  hosts: Web_server
  become: false

  vars:
    app_dir: /var/www/html/app/demo
    db_name: student_employee
    backup_dir: /var/www/html/app/demo/backups

  tasks:
    - name: Configure nginx reverse proxy for Spring Boot
      copy:
        dest: /etc/nginx/sites-available/spring-boot
        content: |
          server {
              listen 80;

              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:8081;

                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }

    - name: Test nginx config
      command: nginx -t

    - name: Restart nginx
      command: nginx -s reload

    - name: Check connection
      ping:


    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: "0755"


    - name: Build Spring Boot project
      shell: mvn clean package -DskipTests
      args:
        chdir: "{{ app_dir }}"
      environment:
        JAVA_HOME: /opt/java/openjdk


    - name: Run tests using SQLite profile
      shell: mvn test -Dspring.profiles.active=test
      args:
        chdir: "{{ app_dir }}"
      environment:
        JAVA_HOME: /opt/java/openjdk


    - name: Backup MySQL database
      shell: |
        mysqldump \
        -h mysql \
        -u root \
        -pHello@123 \
        {{ db_name }} \
        > {{ backup_dir }}/backup.sql


    - name: Show backup files
      shell: ls -lh {{ backup_dir }}
      register: backup


    - name: Display backup
      debug:
        var: backup.stdout_lines