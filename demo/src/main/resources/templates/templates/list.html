<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments :: head('Templates')}"></head>
<body>
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="container container-wrapper">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="page-title mb-0"><i class="bi bi-palette-fill"></i>Templates</h4>
            <a href="/templates/new" class="btn btn-success"><i class="bi bi-plus-lg"></i> New Template</a>
        </div>

        <div class="row g-4" th:if="${not #lists.isEmpty(templates)}">
            <div class="col-md-6 col-lg-4" th:each="t : ${templates}">
                <div class="card h-100">
                    <div class="card-header text-white py-3" th:style="'background: linear-gradient(135deg, ' + ${t.primaryColor} + ', ' + ${t.secondaryColor} + ')'">
                        <h5 class="mb-0" th:text="${t.name}"></h5>
                        <small class="opacity-75" th:text="${t.code}"></small>
                    </div>
                    <div class="card-body">
                        <p class="mb-2"><strong>Organization:</strong> <span th:text="${t.organizationName ?: '-'}"></span></p>
                        <p class="mb-2"><strong>Layout:</strong> <span class="badge bg-info" th:text="${t.layout}"></span></p>
                        <p class="mb-2"><strong>Primary:</strong> <span class="badge" th:style="'background: ' + ${t.primaryColor}" th:text="${t.primaryColor}"></span></p>
                        <p class="mb-2"><strong>Text Color:</strong> <span class="badge border" th:style="'color: ' + ${t.textColor} + '; border-color: ' + ${t.textColor}" th:text="${t.textColor}"></span></p>
                        <p class="mb-0" th:if="${t.tagline}"><em class="text-muted" th:text="'&quot;' + ${t.tagline} + '&quot;'"></em></p>
                    </div>
                    <div class="card-footer bg-white border-0 pt-0">
                        <div class="d-flex gap-2">
                            <a class="btn btn-sm btn-warning" th:href="@{/templates/{id}/edit(id=${t.id})}"><i class="bi bi-pencil"></i> Edit</a>
                            <a class="btn btn-sm btn-outline-danger" th:href="@{/templates/{id}/delete(id=${t.id})}"
                               onclick="return confirm('Delete this template?')"><i class="bi bi-trash"></i> Delete</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" th:if="${#lists.isEmpty(templates)}">
            <div class="card-body text-center py-5 text-muted">
                <i class="bi bi-palette" style="font-size: 3rem; display: block; margin-bottom: 1rem;"></i>
                <h5>No templates yet</h5>
                <p>Create your first ID card template to get started.</p>
                <a href="/templates/new" class="btn btn-primary">Create Template</a>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
